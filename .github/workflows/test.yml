# Sample workflow for testing with Jest before merging to master branch
#
#
name: Run Jest test

on:
  # Runs on pull requests targeting the default branch
  pull_request:
    branches: ["master"]

jobs:
  # Jest tests job
  jest:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run Jest tests
        run: npm test
